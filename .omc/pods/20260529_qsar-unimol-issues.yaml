# Lesson learned (added to GPU preflight practice)
preflight_lesson: |
  nvidia-smi "healthy" + torch.cuda.is_available()=True is NOT sufficient.
  Must run an actual allocation: torch.zeros(1000, device='cuda') + reduce.
  Two EU-SE-1 A40 hosts passed is_available() but failed real alloc with
  "CUDA-capable device(s) is/are busy or unavailable". Always alloc-preflight
  BEFORE uploading code / running the job. Switching GPU class (A40→3090)
  and DC (EU-SE-1→EU-CZ-1) resolved it.

